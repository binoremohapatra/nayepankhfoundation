server.port=8080
spring.application.name=volunteer-hub

# Database Configuration (PostgreSQL in prod, H2 fallback locally)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:file:./data/volunteerdb;DB_CLOSE_ON_EXIT=FALSE;DB_CLOSE_DELAY=-1}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:password}

# H2 Console Configuration
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=true

# Hibernate settings
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update

# Gmail SMTP Configuration (Works for all emails without domain verification)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:binoremohapatra@gmail.com}
spring.mail.password=${MAIL_PASSWORD:YOUR_GMAIL_APP_PASSWORD_HERE}
spring.mail.from=${spring.mail.username}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.ssl.enable=false
spring.mail.properties.mail.smtp.connectiontimeout=10000
spring.mail.properties.mail.smtp.timeout=10000
spring.mail.properties.mail.smtp.writetimeout=10000

# Dev mode fallback: logs OTP in console instead of sending real emails
app.mail.dev-mode=false

# Springdoc OpenAPI Swagger path config
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/api-docs

# Thread pool configuration for @Async methods (like email delivery)
spring.task.execution.pool.core-size=5
spring.task.execution.pool.max-size=15
spring.task.execution.pool.queue-capacity=100
spring.task.execution.thread-name-prefix=VolunteerHub-Async-

