server.port=${PORT:8080}
spring.application.name=volunteer-hub

# Database Configuration (PostgreSQL in prod, H2 fallback locally)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:file:./data/volunteerdb;DB_CLOSE_ON_EXIT=FALSE;DB_CLOSE_DELAY=-1}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:password}



# Hibernate settings
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update

# Gmail / Brevo SMTP Configuration (Works for all emails without domain verification)
spring.mail.host=${SPRING_MAIL_HOST:smtp.gmail.com}
spring.mail.port=${SPRING_MAIL_PORT:587}
spring.mail.username=${SPRING_MAIL_USERNAME:foundationnayepankh@gmail.com}
spring.mail.password=${SPRING_MAIL_PASSWORD:rnyj pgey mkmg xgdf}
spring.mail.from=${SPRING_MAIL_FROM:foundationnayepankh@gmail.com}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.ssl.enable=false
spring.mail.properties.mail.smtp.connectiontimeout=15000
spring.mail.properties.mail.smtp.timeout=15000
spring.mail.properties.mail.smtp.writetimeout=15000

# Dev mode fallback: logs OTP with banner if true, instead of throwing SMTP errors
# Set APP_MAIL_DEV_MODE=false in production environment variables
app.mail.dev-mode=${APP_MAIL_DEV_MODE:false}

# Springdoc OpenAPI Swagger path config
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/api-docs

# Thread pool configuration for @Async methods (like email delivery)
spring.task.execution.pool.core-size=5
spring.task.execution.pool.max-size=15
spring.task.execution.pool.queue-capacity=100
spring.task.execution.thread-name-prefix=VolunteerHub-Async-

