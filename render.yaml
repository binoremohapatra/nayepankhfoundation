databases:
  - name: nayepankh-db
    databaseName: nayepankh
    user: nayepankh_user

services:
  - type: web
    name: nayepankh-backend
    env: java
    rootDir: backend
    buildCommand: "mvn clean package -DskipTests"
    startCommand: "java -jar target/volunteer-hub-0.0.1-SNAPSHOT.jar"
    envVars:
      - key: PORT
        value: 8080
      - key: SPRING_DATASOURCE_URL
        fromDatabase:
          name: nayepankh-db
          property: connectionString
      - key: SPRING_DATASOURCE_USERNAME
        fromDatabase:
          name: nayepankh-db
          property: user
      - key: SPRING_DATASOURCE_PASSWORD
        fromDatabase:
          name: nayepankh-db
          property: password
